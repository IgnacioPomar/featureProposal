server:
  port: 8443
  ssl:
    enabled: true
    bundle: server

spring:
  application:
    name: ssl-application
  main:
    banner-mode: "off"
  ssl:
    bundle:
      pem:
        server:
          reload-on-update: true
          keystore:
            certificate: file:./target/ssl/fullchain.pem
            private-key: file:./target/ssl/private-key.pem
            private-key-password: ${APP_TLS_PRIVATE_KEY_PASSWORD:}
  datasource:
    url: ${APP_DATASOURCE_URL:jdbc:h2:file:./target/db/sslapp;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
    username: ${APP_DATASOURCE_USERNAME:sa}
    password: ${APP_DATASOURCE_PASSWORD:}
    driver-class-name: ${APP_DATASOURCE_DRIVER_CLASS_NAME:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  liquibase:
    enabled: false
    change-log: classpath:db/changelog/db.changelog-master.json

app:
  openapi:
    title: ${APP_OPENAPI_TITLE:SSL Application API}
    description: ${APP_OPENAPI_DESCRIPTION:OpenAPI para endpoint hello y CRUD de tareas}
    version: ${APP_OPENAPI_VERSION:v1}
  tls-page:
    path: ${APP_TLS_PAGE_PATH:/certificate-renewal}
    target-dir: ${APP_TLS_TARGET_DIR:./target/ssl}
    target-name: ${APP_TLS_TARGET_NAME:web-server}

zaleos:
  certificate:
    output:
      # Demo only — do NOT enable in production; set APP_TLS_PRIVATE_KEY_PASSWORD instead.
      write-unencrypted-private-key: true
    targets:
      web-server:
        type: filesystem
        output-dir: ./target/ssl
        activate: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  config: classpath:log4j2-spring.xml

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
